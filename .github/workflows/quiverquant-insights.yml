name: QuiverQuant Market Insights

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 9 AM ET, weekdays only
  workflow_dispatch:          # manual trigger from GitHub mobile app

jobs:
  insights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run QuiverQuant insights
        env:
          QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
        run: python main.py > insights_output.txt 2>&1

      - name: Post insights to job summary
        run: |
          echo "## QuiverQuant Insights — $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat insights_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload raw output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiverquant-insights
          path: insights_output.txt
          retention-days: 7
